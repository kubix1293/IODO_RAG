services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iodo}
      POSTGRES_USER: ${POSTGRES_USER:-iodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iodo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iodo} -d ${POSTGRES_DB:-iodo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "intfloat/multilingual-e5-small"]
    ports:
      - "8080:80"
    volumes:
      - hf_cache:/data
    environment:
      HF_HOME: /data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 20s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 20

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: ["--model-id", "Alibaba-NLP/gte-multilingual-reranker-base"]
    volumes:
      - reranker_cache:/data
    environment:
      HF_HOME: /data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 20s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ./app
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      ollama:
        condition: service_started
    profiles:
      - tools

  web:
    build:
      context: ./app
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "80:8000"
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      ollama:
        condition: service_started
    entrypoint: ["uvicorn"]
    command: ["iodo_rag.web:app", "--host", "0.0.0.0", "--port", "8000"]

  support-web:
    build:
      context: ./app
    env_file: [.env]
    environment:
      RERANKER_URL: http://reranker:80
    volumes:
      - ./data:/data
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: ["alembic upgrade head && uvicorn support.web:app --host 0.0.0.0 --port 8081"]

  support-worker:
    build:
      context: ./app
    env_file: [.env]
    environment:
      RERANKER_URL: http://reranker:80
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      ollama:
        condition: service_started
      reranker:
        condition: service_healthy
    entrypoint: ["python", "-m"]
    command: ["support.worker"]

volumes:
  postgres_data:
  hf_cache:
  ollama_data:
  reranker_cache:
